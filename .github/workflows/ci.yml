name: CI Pipeline

on:
  push:
    branches: [ main, master, zadanie2 ]
  pull_request:
    branches: [ main, master, zadanie2 ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Make mvnw executable
        run: chmod +x mvnw

      - name: Run Tests
        run: ./mvnw -B clean test -Dspring.profiles.active=test
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          JWT_SECRET: testjwtsecretforcionlymin32characterslong

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Make mvnw executable
        run: chmod +x mvnw

      - name: Build JAR
        run: ./mvnw -B clean package -DskipTests
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          JWT_SECRET: testjwtsecretforcionlymin32characterslong
          DB_USERNAME: ci
          DB_PASSWORD: ci

      - name: Verify JAR
        run: test -f target/photoprintapplication-0.0.1-SNAPSHOT.jar

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: photoprint-application
          path: target/photoprintapplication-0.0.1-SNAPSHOT.jar
