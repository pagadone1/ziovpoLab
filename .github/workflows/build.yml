name: Lab3 CI

on:
  push:
    branches: [ "lab3" ]
  pull_request:
    branches: [ "lab3" ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Prepare application config
        run: cp src/main/resources/application.properties.example src/main/resources/application.properties

      - name: Decode Keystore
        run: |
          mkdir -p src/main/resources
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > src/main/resources/keystore.p12

      - name: Make mvnw executable
        run: chmod +x mvnw

      - name: Run Tests (signature + license)
        run: ./mvnw clean test
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          JWT_SECRET: testjwtsecretforcionlymin32characterslong
          DB_HOST: localhost
          DB_NAME: test
          DB_USER: test
          DB_PASSWORD: test
          ADMIN_PASSWORD: Admin1234!

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Prepare application config
        run: cp src/main/resources/application.properties.example src/main/resources/application.properties

      - name: Decode Keystore
        run: |
          mkdir -p src/main/resources
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > src/main/resources/keystore.p12

      - name: Export certificate from keystore
        run: |
          keytool -exportcert -alias laba6_key \
            -keystore src/main/resources/keystore.p12 \
            -storepass "${{ secrets.KEYSTORE_PASSWORD }}" \
            -file /tmp/cert.der
          openssl x509 -inform der -in /tmp/cert.der -out /tmp/cert-from-keystore.pem

      - name: Verify public key secret (SIGNATURE_PUBLIC_KEY_PEM)
        env:
          SIGNATURE_PUBLIC_KEY_PEM: ${{ secrets.SIGNATURE_PUBLIC_KEY_PEM }}
        run: |
          if [ -z "$SIGNATURE_PUBLIC_KEY_PEM" ]; then
            echo "::warning::SIGNATURE_PUBLIC_KEY_PEM secret is not set"
            exit 0
          fi
          printf '%s\n' "$SIGNATURE_PUBLIC_KEY_PEM" > /tmp/cert-from-secret.pem
          openssl x509 -in /tmp/cert-from-secret.pem -noout -subject
          diff /tmp/cert-from-keystore.pem /tmp/cert-from-secret.pem

      - name: Make mvnw executable
        run: chmod +x mvnw

      - name: Build Artifact
        run: ./mvnw clean package -DskipTests
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          JWT_SECRET: testjwtsecretforcionlymin32characterslong
          DB_HOST: localhost
          DB_NAME: test
          DB_USER: test
          DB_PASSWORD: test
          ADMIN_PASSWORD: Admin1234!

      - name: Verify Build Artifact
        run: test -f target/ziovpo-0.0.1-SNAPSHOT.jar

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ziovpo-lab3-jar
          path: target/ziovpo-0.0.1-SNAPSHOT.jar
