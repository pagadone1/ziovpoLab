name: ziovpo ci/cd

on:
  push:
    branches: [ "main", "lab3" ]
  pull_request:
    branches: [ "main", "lab3" ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Prepare application config
        run: cp src/main/resources/application.properties.example src/main/resources/application.properties

      - name: Decode Keystore
        run: |
          mkdir -p src/main/resources
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > src/main/resources/keystore.p12

      - name: Make mvnw executable
        run: chmod +x mvnw

      - name: Run Tests
        run: ./mvnw clean test
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          JWT_SECRET: testjwtsecretforcionlymin32characterslong
          DB_HOST: localhost
          DB_NAME: test
          DB_USER: test
          DB_PASSWORD: test
          ADMIN_PASSWORD: Admin1234

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Prepare application config
        run: cp src/main/resources/application.properties.example src/main/resources/application.properties

      - name: Decode Keystore
        run: |
          mkdir -p src/main/resources
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > src/main/resources/keystore.p12

      - name: Export public certificate
        run: |
          keytool -exportcert -alias laba6_key \
            -keystore src/main/resources/keystore.p12 \
            -storepass "${{ secrets.KEYSTORE_PASSWORD }}" \
            -file /tmp/cert.der
          openssl x509 -inform der -in /tmp/cert.der -out /tmp/cert.pem

      - name: Make mvnw executable
        run: chmod +x mvnw

      - name: Build Artifact
        run: ./mvnw clean package -DskipTests
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          JWT_SECRET: testjwtsecretforcionlymin32characterslong
          DB_HOST: localhost
          DB_NAME: test
          DB_USER: test
          DB_PASSWORD: test
          ADMIN_PASSWORD: Admin1234

      - name: Verify Build Artifact
        run: test -f target/ziovpo-0.0.1-SNAPSHOT.jar

      - name: Verify Public Key
        run: |
          openssl x509 -in /tmp/cert.pem -text -noout | grep -E "Subject:|CN=|Public-Key:"

      - name: Verify Signature Algorithm
        run: |
          openssl x509 -in /tmp/cert.pem -text -noout | grep -A2 "Signature"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ziovpo-app-jar
          path: target/ziovpo-0.0.1-SNAPSHOT.jar
