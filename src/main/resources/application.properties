spring.application.name=CarService-License

spring.datasource.url=jdbc:postgresql://localhost:5432/photoprint
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

jwt.secret=${JWT_SECRET}
jwt.access-expiration=900000
jwt.refresh-expiration=604800000

server.port=8443
server.ssl.enabled=true
server.ssl.key-store-type=PKCS12
server.ssl.key-store=classpath:certs/keystore.p12
server.ssl.key-store-password=${KEYSTORE_PASSWORD}
server.ssl.key-alias=server-1bib23336

signature.private-key-path=classpath:certs/keystore.p12
signature.keystore-password=${KEYSTORE_PASSWORD}
signature.alias=server-1bib23336

app.bootstrap.admin.username=${ADMIN_USERNAME:admin}
app.bootstrap.admin.password=${ADMIN_PASSWORD:Admin1234!}
app.bootstrap.admin.email=${ADMIN_EMAIL:admin@carservice.local}

spring.jackson.serialization.write-dates-as-timestamps=false
