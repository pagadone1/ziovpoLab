spring.application.name=PhotoPrintApplication

# PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/photoprint
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.level.org.hibernate.SQL=DEBUG

jwt.secret=${JWT_SECRET}
#15min
jwt.access-expiration=900000
#7days
jwt.refresh-expiration=604800000

#server.port=8080
#
server.port=8443
server.ssl.enabled=true
server.ssl.key-store-type=PKCS12
server.ssl.key-store=classpath:certs/keystore.p12
server.ssl.key-store-password=${KEYSTORE_PASSWORD}
server.ssl.key-alias=server-1bib23336
#

server.servlet.session.timeout=PT0S
spring.session.store-type=none

logging.level.com.example.photoprintapplication1=DEBUG
logging.level.org.springframework.security=DEBUG

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=50MB

spring.task.scheduling.enabled=true

spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.deserialization.adjust-dates-to-context-time-zone=false

signature.private-key-path=classpath:certs/keystore.p12
signature.keystore-password=${KEYSTORE_PASSWORD}
signature.alias=server-1bib23336
