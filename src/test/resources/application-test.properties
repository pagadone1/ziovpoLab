spring.application.name=itsupp-test

server.port=0
server.ssl.enabled=false

spring.datasource.url=jdbc:h2:mem:itsupp;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

jwt.secret=testjwtsecretforunittestsmin32characterslong
jwt.access.expiration=900000
jwt.refresh.expiration.days=30

app.admin.username=admin
app.admin.password=Admin1234
app.admin.email=admin@test.com
