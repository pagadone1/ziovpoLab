spring.application.name=PhotoPrintApplication-test

spring.datasource.url=jdbc:h2:mem:photoprint;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

server.port=0
server.ssl.enabled=false

jwt.secret=testjwtsecretforunittestsmin32characterslong
jwt.access-expiration=900000
jwt.refresh-expiration=604800000

signature.private-key-path=classpath:certs/keystore.p12
signature.keystore-password=${KEYSTORE_PASSWORD:changeit}
signature.alias=server-1bib23336
